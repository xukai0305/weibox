        // ==================== 갤러리 ====================
        function openGallery(postId, idx) {
            const post = posts.find(p => p.id === postId);
            if (!post || !post.media.length) return;
            galleryItems = post.media.map((m, i) => ({ ...m, postId }));
            galleryIndex = idx;
            updateGallery();
            document.getElementById('galleryModal').classList.add('active');
            document.body.style.overflow = 'hidden';
            const galleryContent = document.querySelector('.gallery-content');
            if (galleryContent) {
                // PC: 좌우 드래그 + 아래 끌어내리기 통합
                galleryContent.addEventListener('mousedown', (e) => {
                    onDragStart(e);
                    onMousePullStart(e);
                });
                window.addEventListener('mousemove', (e) => {
                    onDragMove(e);
                    onMousePullMove(e);
                });
                window.addEventListener('mouseup', (e) => {
                    onDragEnd(e);
                    onMousePullEnd(e);
                });
            }
            // 맥 터치패드 스와이프
            const gm = document.getElementById('galleryModal');
            gm.addEventListener('wheel', onGalleryWheel, { passive: false });
            // pull-down to close (터치)
            gm.addEventListener('touchstart', onPullStart, { passive: false });
            gm.addEventListener('touchmove', onPullMove, { passive: false });
            gm.addEventListener('touchend', onPullEnd);
        }
        
        function updateGallery() {
            const item = galleryItems[galleryIndex];
            const counter = document.getElementById('galleryCounter');
            if (counter) counter.textContent = `${galleryIndex+1}/${galleryItems.length}`;
            const container = document.getElementById('galleryMediaContainer');
            if (!container) return;
            // 이전 동영상 정지 후 제거
            const prevVid = container.querySelector('video');
            if (prevVid) { prevVid.pause(); prevVid.src = ''; prevVid.load(); }
            container.style.opacity = '0';
            container.style.transition = 'opacity 0.15s ease';
            setTimeout(() => { container.style.opacity = '1'; }, 30);
            if (item.type === 'video') {
                // playsinline: iOS에서 전체화면 강제 방지, 인라인 재생
                // webkit-playsinline: 구형 iOS Safari 대응
                // autoplay muted 후 소리 켜기: 브라우저 자동재생 정책 우회
                container.innerHTML = `<video 
                    class="gallery-media" 
                    controls 
                    playsinline
                    webkit-playsinline
                    x5-playsinline
                    style="max-width:90vw;max-height:80vh;width:auto;height:auto;display:block;background:#000;">
                    <source src="${getVideoUrl(item.filePath)}#t=0.001" type="video/mp4">
                    <source src="${item.filePath}#t=0.001" type="video/quicktime">
                </video>`;
                // DOM에 추가된 후 재생 시도
                const vid = container.querySelector('video');
                if (vid) {
                    vid.load();
                    vid.play().catch(() => {}); // 자동재생 실패해도 무시
                }
            } else {
                container.innerHTML = `<img class="gallery-media" src="${item.filePath}" onerror="this.src='data:image/svg+xml,%3Csvg...%3E'">`;
            }
            const prevBtn = document.getElementById('galleryPrevBtn');
            const nextBtn = document.getElementById('galleryNextBtn');
            if (prevBtn) { if (galleryIndex === 0) prevBtn.classList.add('hidden'); else prevBtn.classList.remove('hidden'); }
            if (nextBtn) { if (galleryIndex === galleryItems.length - 1) nextBtn.classList.add('hidden'); else nextBtn.classList.remove('hidden'); }
        }
        
        function onDragStart(e) { isDragging = true; dragStartX = e.clientX; e.preventDefault(); }
        function onDragMove(e) { if (!isDragging) return; document.body.style.cursor = 'grabbing'; }
        function onDragEnd(e) {
            if (!isDragging) return;
            isDragging = false;
            document.body.style.cursor = '';
            const diff = e.clientX - dragStartX;
            if (Math.abs(diff) > 50) diff > 0 ? prevMedia() : nextMedia();
        }

        // ── 맥 터치패드 스와이프 (wheel 이벤트) ──
        let wheelLock = false;
        function onGalleryWheel(e) {
            if (wheelLock) return;
            // 수평 스와이프만 처리 (수직은 줌/스크롤)
            if (Math.abs(e.deltaX) < Math.abs(e.deltaY)) return;
            if (Math.abs(e.deltaX) < 30) return;
            wheelLock = true;
            setTimeout(() => { wheelLock = false; }, 400);
            e.preventDefault();
            if (e.deltaX > 0) nextMedia(); else prevMedia();
        }

        // ── pull-down to close (터치 & 마우스) ──
        let pullDirectionLocked = null; // 'vertical' | 'horizontal' | null

        function onPullStart(e) {
            if (e.target.tagName === 'VIDEO') return;
            const t = e.changedTouches ? e.changedTouches[0] : e;
            pullStartX = t.clientX;
            pullStartY = t.clientY;
            pullCurrentY = pullStartY;
            isPulling = false;
            pullDirectionLocked = null;
        }
        function onPullMove(e) {
            if (e.target.tagName === 'VIDEO') return;
            const t = e.changedTouches ? e.changedTouches[0] : e;
            const dx = t.clientX - pullStartX;
            const dy = t.clientY - pullStartY;

            // 방향 아직 안 정해진 경우 결정
            if (!pullDirectionLocked && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
                pullDirectionLocked = Math.abs(dy) > Math.abs(dx) ? 'vertical' : 'horizontal';
            }
            // 수평이면 좌우 스와이프로 넘김 (pull-down 안 함)
            if (pullDirectionLocked === 'horizontal') return;
            // 위로 당기는 건 무시
            if (dy <= 0) return;

            isPulling = true;
            pullCurrentY = t.clientY;
            e.preventDefault();
            const gm = document.getElementById('galleryModal');
            gm.classList.add('pulling');
            const container = document.getElementById('galleryMediaContainer');
            if (container) {
                const progress = Math.min(dy / 260, 1);
                container.style.transform = `translateY(${dy * 0.75}px) scale(${1 - progress * 0.1})`;
                container.style.opacity = String(1 - progress * 0.65);
                gm.style.background = `rgba(0,0,0,${Math.max(0.1, 0.97 - progress * 0.87)})`;
            }
        }
        function onPullEnd(e) {
            pullDirectionLocked = null;
            if (!isPulling) return;
            isPulling = false;
            const dy = pullCurrentY - pullStartY;
            const container = document.getElementById('galleryMediaContainer');
            const gm = document.getElementById('galleryModal');
            if (dy > 90) {
                // 영상 즉시 정지 (애니메이션 중에도 소리 안 나게)
                const vid = container ? container.querySelector('video') : null;
                if (vid) { vid.pause(); vid.src = ''; }
                if (container) {
                    container.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
                    container.style.transform = `translateY(${window.innerHeight * 0.45}px) scale(0.85)`;
                    container.style.opacity = '0';
                }
                setTimeout(() => closeGallery(), 190);
            } else {
                if (container) {
                    container.style.transition = 'transform 0.28s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s ease';
                    container.style.transform = '';
                    container.style.opacity = '';
                    if (gm) gm.style.background = '';
                }
                setTimeout(() => {
                    if (container) container.style.transition = '';
                    if (gm) gm.classList.remove('pulling');
                }, 290);
            }
        }

        // ── 마우스로 끌어내리기 (PC) ──
        let mouseDownY = 0, isMousePulling = false, mousePullActive = false;
        function onMousePullStart(e) {
            if (e.target.tagName === 'VIDEO') return;
            mouseDownY = e.clientY;
            isMousePulling = false;
            mousePullActive = true;
        }
        function onMousePullMove(e) {
            if (!mousePullActive) return;
            const dy = e.clientY - mouseDownY;
            const dx = e.clientX - dragStartX;
            // 수평 드래그 중이면 무시
            if (Math.abs(dx) > 20) { mousePullActive = false; return; }
            if (dy <= 0) return;
            isMousePulling = true;
            e.preventDefault();
            const gm = document.getElementById('galleryModal');
            gm.classList.add('pulling');
            const container = document.getElementById('galleryMediaContainer');
            if (container) {
                const progress = Math.min(dy / 260, 1);
                container.style.transform = `translateY(${dy * 0.75}px) scale(${1 - progress * 0.1})`;
                container.style.opacity = String(1 - progress * 0.65);
                gm.style.background = `rgba(0,0,0,${Math.max(0.1, 0.97 - progress * 0.87)})`;
            }
        }
        function onMousePullEnd(e) {
            if (!isMousePulling) { mousePullActive = false; return; }
            mousePullActive = false;
            isMousePulling = false;
            const dy = e.clientY - mouseDownY;
            const container = document.getElementById('galleryMediaContainer');
            const gm = document.getElementById('galleryModal');
            if (dy > 90) {
                const vid = container ? container.querySelector('video') : null;
                if (vid) { vid.pause(); vid.src = ''; }
                if (container) {
                    container.style.transition = 'transform 0.2s ease, opacity 0.2s ease';
                    container.style.transform = `translateY(${window.innerHeight * 0.45}px) scale(0.85)`;
                    container.style.opacity = '0';
                }
                setTimeout(() => closeGallery(), 190);
            } else {
                if (container) {
                    container.style.transition = 'transform 0.28s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s ease';
                    container.style.transform = '';
                    container.style.opacity = '';
                    if (gm) gm.style.background = '';
                }
                setTimeout(() => {
                    if (container) container.style.transition = '';
                    if (gm) gm.classList.remove('pulling');
                }, 290);
            }
        }
        function nextMedia() { if (galleryIndex < galleryItems.length-1) { galleryIndex++; updateGallery(); } }
        function prevMedia() { if (galleryIndex > 0) { galleryIndex--; updateGallery(); } }
        function closeGallery() {
            const gm = document.getElementById('galleryModal');
            // 동영상 재생 중이면 즉시 정지 (갤러리 닫혀도 소리 계속 나는 버그 수정)
            const vid = document.querySelector('#galleryMediaContainer video');
            if (vid) { vid.pause(); vid.src = ''; vid.load(); }
            gm.classList.remove('active');
            gm.classList.remove('pulling');
            const container = document.getElementById('galleryMediaContainer');
            if (container) { container.style.transform = ''; container.style.opacity = ''; container.innerHTML = ''; }
            document.body.style.overflow = '';
            document.body.style.cursor = '';
            gm.removeEventListener('touchstart', onPullStart);
            gm.removeEventListener('touchmove', onPullMove);
            gm.removeEventListener('touchend', onPullEnd);
            gm.removeEventListener('wheel', onGalleryWheel);
            // PC 이벤트는 window에 붙어있어서 자동 정리됨 (갤러리 닫히면 mousePullActive=false)
            mousePullActive = false;
            isPulling = false;
            pullDirectionLocked = null;
        }
        
        // ==================== 프로필 ====================
        function updateProfileUI() {
            const topAvatar = document.querySelector('.top-avatar');
            const imgHtml = `<img src="${currentProfile.imagePath}" onerror="this.onerror=null;this.parentElement.innerHTML='<span>🐣</span>'">`;
            if (topAvatar) topAvatar.innerHTML = imgHtml;
        }
        
        function viewProfileImage(path) {
            document.getElementById('imageViewerImg').src = path;
            document.getElementById('imageViewer').classList.add('active');
        }
        
        function showAlert(title, msg, files = [], isError = false) {
            document.getElementById('alertIcon').innerHTML = isError
                ? '<svg width="40" height="40" style="color:#f44336"><use href="#ic-warn"/></svg>'
                : '<svg width="40" height="40" style="color:#4caf50"><use href="#ic-ok"/></svg>';
            document.getElementById('alertTitle').textContent = title;
            document.getElementById('alertMessage').textContent = msg;
            const filesDiv = document.getElementById('alertFilesList');
            if (files.length) { filesDiv.style.display = 'block'; filesDiv.innerHTML = files.map(f => `<p> ${f}</p>`).join(''); }
            else { filesDiv.style.display = 'none'; }
            document.getElementById('alertModal').classList.add('active');
        }
        
        function closeAlert() { document.getElementById('alertModal').classList.remove('active'); }
        
        // ==================== 검색 ====================
        function handleSearch() {
            searchKeyword = document.getElementById('searchInput').value;
            const clearBtn = document.getElementById('clearSearchBtn');
            if (clearBtn) clearBtn.style.display = searchKeyword ? 'block' : 'none';
            currentPage = 1;
            if (activeTab === 'posts') renderPosts(); else renderArchive();
        }
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            searchKeyword = '';
            const clearBtn = document.getElementById('clearSearchBtn');
            if (clearBtn) clearBtn.style.display = 'none';
            currentPage = 1;
            if (activeTab === 'posts') renderPosts(); else renderArchive();
        }
        
        // ==================== 백업 ====================
        function exportData() {
            const data = { version: '1.0', exportDate: new Date().toISOString(), posts, currentProfile };
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)], {type:'application/json'}));
            a.download = `weibo_backup_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.json`;
            a.click();
            URL.revokeObjectURL(a.href);
            showAlert('백업 완료', `${posts.length}개 게시물 백업됨`);
        }
        
        function importData(file) {
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.posts) { posts = sortPosts(data.posts); savePosts(); }
                    if (data.currentProfile) {
                        currentProfile = data.currentProfile;
                        // 기존 백업 포맷 호환
                        if (!profiles.find(p => p.imagePath === currentProfile.imagePath && p.name === currentProfile.name)) {
                            profiles[0] = { ...profiles[0], ...currentProfile };
                        }
                        saveProfiles();
                        updateProfileUI();
                    }
                    currentPage = 1;
                    if (activeTab === 'posts') renderPosts(); else renderArchive();
                    showAlert('복원 완료', `${posts.length}개 게시물 복원됨`);
                    scheduleSync();
                } catch(err) { showAlert('오류', '파일 형식 오류', [], true); }
            };
            reader.readAsText(file);
        }
        
        // ==================== 이벤트 등록 ====================
        document.getElementById('addBtn').onclick = () => openPostModal(null);
        document.getElementById('closePostModalBtn').onclick = closePostModal;
        document.getElementById('cancelPostBtn').onclick = closePostModal;
        document.getElementById('savePostBtn').onclick = savePost;
        document.getElementById('selectFileBtn').onclick = () => document.getElementById('fileInput').click();
        document.getElementById('fileInput').onchange = (e) => {
            Array.from(e.target.files).forEach(file => { newMediaFiles.push({ file, url: URL.createObjectURL(file) }); });
            renderNewMedia();
            e.target.value = '';
        };
        
        document.getElementById('topAvatarBtn').onclick = openEditProfileModal;
        document.getElementById('profileDropdownBtn').onclick = (e) => { e.stopPropagation(); openProfileMenu(); };
        document.getElementById('closeProfileModalBtn').onclick = () => document.getElementById('profileModal').classList.remove('active');
        document.getElementById('cancelProfileBtn').onclick = () => document.getElementById('profileModal').classList.remove('active');
        document.getElementById('deleteProfileBtn').onclick = () => {
            const editId = document.getElementById('profilePreviewImg')._editingId;
            if (!editId || profiles.length <= 1) { showAlert('삭제 불가', '마지막 프로필은 삭제할 수 없습니다.', [], true); return; }
            if (confirm('이 프로필을 삭제하시겠습니까?')) {
                profiles = profiles.filter(p => p.id !== editId);
                if (currentProfileId === editId) { currentProfile = profiles[0]; currentProfileId = profiles[0].id; }
                saveProfiles(); updateProfileUI();
                document.getElementById('profileModal').classList.remove('active');
                showAlert('삭제 완료', '프로필이 삭제되었습니다.');
                scheduleSync();
            }
        };
        document.getElementById('profilePreviewImg').onclick = () => document.getElementById('profileImageInput').click();
        document.getElementById('profileImageInput').onchange = async (e) => {
            if (!isAdmin()) { checkAdmin(); return; }
            if (e.target.files[0]) {
                const file = e.target.files[0];
                showAlert('업로드 중', '프로필 이미지를 Cloudinary에 업로드하는 중입니다...');
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
                try {
                    const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/upload`, { method: 'POST', body: formData });
                    if (!response.ok) throw new Error('업로드 실패');
                    const data = await response.json();
                    const imgEl = document.getElementById('profilePreviewImg');
                    const editId = imgEl._editingId;
                    const isNew = imgEl._isNew;

                    if (isNew) {
                        // 새 프로필: 아직 profiles에 없으므로 임시 경로만 저장
                        imgEl._tempImagePath = data.secure_url;
                    } else {
                        // 기존 프로필 수정: 바로 저장
                        const idx = profiles.findIndex(p => p.id === editId);
                        if (idx !== -1) {
                            profiles[idx].imagePath = data.secure_url;
                            if (editId === currentProfileId) currentProfile = profiles[idx];
                        }
                        updateProfileUI();
                        saveProfiles();
                    }
                    // 미리보기 항상 업데이트
                    imgEl.innerHTML = `<img src="${data.secure_url}">`;
                    showAlert('이미지 변경 완료', '프로필 이미지가 변경되었습니다.');
                    scheduleSync();
                } catch (error) {
                    showAlert('업로드 실패', '프로필 이미지 업로드에 실패했습니다.', [], true);
                }
            }
            e.target.value = '';
        };
        document.getElementById('saveProfileBtn').onclick = () => {
            if (!isAdmin()) { checkAdmin(); return; }
            const name = document.getElementById('profileNameInput').value.trim() || '허개🐷';
            const imgEl = document.getElementById('profilePreviewImg');
            const editId = imgEl._editingId;
            const isNew = imgEl._isNew;

            if (!isNew && editId) {
                // 기존 프로필 수정
                const idx = profiles.findIndex(p => p.id === editId);
                if (idx !== -1) {
                    profiles[idx].name = name;
                    if (editId === currentProfileId) { currentProfile = profiles[idx]; }
                }
            } else {
                // 새 프로필 추가 - _tempImagePath에 업로드된 이미지 있으면 사용
                const imgPath = imgEl._tempImagePath || 'images/profile.jpg';
                const newP = { id: Date.now(), name, imagePath: imgPath };
                profiles.push(newP);
                // 새 프로필로 자동 전환
                currentProfile = newP;
                currentProfileId = newP.id;
            }
            saveProfiles();
            updateProfileUI();
            document.getElementById('profileModal').classList.remove('active');
            if (activeTab === 'posts') renderPosts(); else renderArchive();
            showAlert('저장 완료', '프로필이 저장되었습니다.');
            scheduleSync();
        };
        
        document.getElementById('alertCloseBtn').onclick = closeAlert;
        
        document.getElementById('backupBtn').onclick = () => document.getElementById('backupModal').classList.add('active');
        document.getElementById('closeBackupModalBtn').onclick = () => document.getElementById('backupModal').classList.remove('active');
        document.getElementById('cancelBackupBtn').onclick = () => document.getElementById('backupModal').classList.remove('active');
        document.getElementById('exportBtn').onclick = () => { exportData(); document.getElementById('backupModal').classList.remove('active'); };
        document.getElementById('importBtn').onclick = () => document.getElementById('importFileInput').click();
        document.getElementById('importFileInput').onchange = (e) => {
            if (e.target.files[0]) { importData(e.target.files[0]); document.getElementById('backupModal').classList.remove('active'); e.target.value = ''; }
        };
        
        document.getElementById('imageViewerClose').onclick = () => document.getElementById('imageViewer').classList.remove('active');
        document.getElementById('imageViewer').onclick = (e) => { if (e.target === document.getElementById('imageViewer')) document.getElementById('imageViewer').classList.remove('active'); };
        
        const galleryCloseBtn = document.getElementById('galleryCloseBtn');
        if (galleryCloseBtn) galleryCloseBtn.onclick = closeGallery;
        document.getElementById('galleryPrevBtn').onclick = prevMedia;
        document.getElementById('galleryNextBtn').onclick = nextMedia;
        
        let touchStart = 0;
        document.getElementById('galleryModal').addEventListener('touchstart', e => { touchStart = e.changedTouches[0].screenX; });
        document.getElementById('galleryModal').addEventListener('touchend', e => {
            const diff = e.changedTouches[0].screenX - touchStart;
            if (Math.abs(diff) > 50) diff > 0 ? prevMedia() : nextMedia();
        });
        
        document.getElementById('postsTabBtn').onclick = switchToPosts;
        document.getElementById('archiveTabBtn').onclick = switchToArchive;
        document.getElementById('searchInput').addEventListener('input', handleSearch);
        document.getElementById('clearSearchBtn').onclick = clearSearch;
        
        document.querySelectorAll('.modal-overlay').forEach(modal => {
            modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('active'); });
        });
        
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
                closeGallery();
                document.getElementById('imageViewer').classList.remove('active');
            }
            if (document.getElementById('galleryModal').classList.contains('active')) {
                if (e.key === 'ArrowLeft') prevMedia();
                if (e.key === 'ArrowRight') nextMedia();
            }
        });
        
        window.openGallery = openGallery;
        window.deletePost = deletePost;
        window.goToPage = goToPage;
        window.goToArchivePage = goToArchivePage;
        window.openPostModal = openPostModal;
        window.viewProfileImage = viewProfileImage;
        window.scrollToPost = scrollToPost;
        window.closeGallery = closeGallery;
        window.toggleStar = toggleStar;
        window.switchProfile = switchProfile;
        window.openEditProfileModal = openEditProfileModal;
        window.openNewProfileModal = openNewProfileModal;

        // 즐겨찾기 필터 버튼
        document.getElementById('starFilterBtn').onclick = toggleStarFilter;

        // 드롭다운 바깥 클릭 시 닫기
        document.addEventListener('click', (e) => {
            const menu = document.getElementById('profileMenu');
            if (menu && menu.classList.contains('open')) {
                const wrap = document.querySelector('.profile-wrap');
                if (wrap && !wrap.contains(e.target)) closeProfileMenu();
            }
        });
        
        loadData();
        updateAdminUI();
        startAutoPolling();

        // 상단 이동 버튼
        const scrollTopBtn = document.getElementById('scrollTopBtn');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 300) scrollTopBtn.classList.add('visible');
            else scrollTopBtn.classList.remove('visible');
        }, { passive: true });
        scrollTopBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
        
        if (!isAdmin()) {
            document.querySelectorAll('.edit-btn, .delete-btn').forEach(btn => { if (btn.style) btn.style.display = 'none'; });
        }
    </script>
</body>
</html>
