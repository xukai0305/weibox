<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://api.jsonbin.io">
    <link rel="preconnect" href="https://res.cloudinary.com">
    <link rel="dns-prefetch" href="https://api.cloudinary.com">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🐷 许凯 Weibo - 허개 웨이보 백업</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #f0f0f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .container { max-width: 680px; margin: 0 auto; background-color: #fff; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .header { background: #fff; border-bottom: 1px solid #efefef; padding: 10px 16px; position: sticky; top: 0; z-index: 100; }
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .header h1 { font-size: 18px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .header h1 span { background: #ff8200; color: white; font-size: 10px; padding: 2px 6px; border-radius: 12px; }
        .header-buttons { display: flex; gap: 8px; align-items: center; }
        .top-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #ff8200, #ffb347); overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .top-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .top-avatar span { font-size: 20px; }
        .icon-btn { width: 36px; height: 36px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; border: none; }
        .add-btn { width: 36px; height: 36px; border-radius: 50%; background: #ff8200; color: white; border: none; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .tabs { display: flex; border-bottom: 1px solid #efefef; background: #fff; }
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; font-size: 14px; font-weight: 500; color: #666; cursor: pointer; }
        .tab-btn.active { color: #ff8200; border-bottom: 2px solid #ff8200; }
        .search-bar { display: flex; gap: 8px; align-items: center; background: #f5f5f5; border-radius: 20px; padding: 6px 12px; margin-top: 8px; }
        .search-bar input { flex: 1; border: none; background: none; font-size: 13px; padding: 6px 0; outline: none; }
        .search-bar button { background: none; border: none; font-size: 14px; cursor: pointer; padding: 4px; color: #999; }
        .stats { padding: 8px 16px; background: #fafafa; font-size: 12px; color: #666; border-bottom: 1px solid #efefef; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .stats-left { display: flex; align-items: center; gap: 8px; }
        .sort-btn { background: none; border: 1px solid #ddd; padding: 4px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; color: #ff8200; }
        .sync-status { font-size: 10px; padding: 2px 6px; border-radius: 12px; background: #f0f0f0; display: inline-block; }
        .sync-status.synced { background: #e8f5e9; color: #4caf50; }
        .sync-status.syncing { background: #fff3e0; color: #ff9800; }
        .sync-status.error { background: #ffebee; color: #f44336; }
        
        /* 게시물 카드 */
        .post-card { border-bottom: 1px solid #efefef; padding: 14px; scroll-margin-top: 120px; transition: background 0.3s; position: relative; }
        .post-card.highlight { background: #fff9e6; }
        .post-header { display: flex; gap: 10px; margin-bottom: 10px; }
        .post-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #ff8200, #ffb347); overflow: hidden; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .post-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .post-user-info h3 { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .post-user-info h3 .badge { background: #ff8200; color: white; font-size: 9px; padding: 2px 5px; border-radius: 10px; }
        .post-date { font-size: 10px; color: #999; }
        .post-location { font-size: 10px; color: #999; margin-top: 2px; }
        .post-content { margin-bottom: 12px; font-size: 14px; line-height: 1.45; white-space: pre-wrap; word-break: break-word; }
        
        /* 반응형 미디어 그리드 */
        .post-media { display: grid; gap: 4px; margin-bottom: 12px; border-radius: 12px; overflow: hidden; background: #f5f5f5; }
        .post-media.grid-1 { grid-template-columns: 1fr; }
        .post-media.grid-2 { grid-template-columns: repeat(2, 1fr); }
        .post-media.grid-3 { grid-template-columns: repeat(3, 1fr); }
        .post-media.grid-4 { grid-template-columns: repeat(2, 1fr); }
        .post-media.grid-5, .post-media.grid-6, .post-media.grid-7, .post-media.grid-8, .post-media.grid-9 { grid-template-columns: repeat(3, 1fr); }
        
        .post-media-item { background: #f0f0f0; cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .post-media.grid-1 .post-media-item { min-height: 280px; max-height: 400px; }
        .post-media.grid-2 .post-media-item { aspect-ratio: 1; }
        .post-media.grid-4 .post-media-item { aspect-ratio: 1; }
        .post-media.grid-3 .post-media-item,
        .post-media.grid-5 .post-media-item,
        .post-media.grid-6 .post-media-item,
        .post-media.grid-7 .post-media-item,
        .post-media.grid-8 .post-media-item,
        .post-media.grid-9 .post-media-item { aspect-ratio: 1; }
        
        .post-media-item img,
        .post-media-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .post-media.grid-1 .post-media-item img,
        .post-media.grid-1 .post-media-item video {
            object-fit: contain;
            background: #000;
        }
        
        /* 비디오 썸네일을 위한 스타일 */
        .post-media-item video {
            background: #1a1a1a;
        }
        
        .post-actions { display: flex; gap: 16px; padding-top: 10px; border-top: 1px solid #efefef; flex-wrap: wrap; }
        .action-btn { display: flex; align-items: center; gap: 4px; color: #666; font-size: 12px; background: none; border: none; cursor: pointer; padding: 4px 0; }
        .edit-btn { color: #4caf50; }
        .delete-btn { color: #ff4444; margin-left: auto; }
        
        /* 보관함 */
        .archive-month { margin-bottom: 24px; }
        .archive-month-header { padding: 12px 16px; background: #fafafa; font-size: 14px; font-weight: 600; color: #ff8200; border-bottom: 1px solid #efefef; position: sticky; top: 110px; background: rgba(255,255,255,0.95); backdrop-filter: blur(8px); z-index: 10; }
        .archive-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; background: #f0f0f0; }
        .archive-item { aspect-ratio: 1; background: #f0f0f0; cursor: pointer; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .archive-item img, .archive-item video { width: 100%; height: 100%; object-fit: cover; }
        .archive-item-badge { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.6); color: white; font-size: 10px; padding: 2px 6px; border-radius: 12px; }
        
        .pagination { display: flex; justify-content: center; gap: 6px; padding: 16px; border-top: 1px solid #efefef; flex-wrap: wrap; }
        .page-btn { padding: 6px 12px; border: 1px solid #ddd; background: white; border-radius: 18px; cursor: pointer; font-size: 13px; }
        .page-btn.active { background: #ff8200; color: white; border-color: #ff8200; }
        
        /* 모달 스타일 */
        .modal-overlay { display: flex; visibility: hidden; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-overlay.active { visibility: visible; }
        .modal-container { background: white; border-radius: 20px; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
        .modal-header { padding: 14px 18px; border-bottom: 1px solid #efefef; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: white; }
        .modal-header h2 { font-size: 16px; font-weight: 600; }
        .modal-close { width: 30px; height: 30px; border-radius: 50%; background: #f0f0f0; border: none; font-size: 18px; cursor: pointer; }
        .modal-body { padding: 18px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 12px; font-size: 13px; font-family: inherit; }
        .form-group textarea { min-height: 80px; resize: vertical; }
        /* 모바일에서 달력 입력창 너비 조정 */
        .form-group input[type="date"] {
            width: 100%;
            box-sizing: border-box;
            -webkit-appearance: none;
            appearance: none;
            font-size: 13px;
            font-family: inherit;
            padding: 10px 12px;
            min-height: 42px;
            cursor: pointer;
        }
        @media (max-width: 480px) {
            .form-group input[type="date"] {
                font-size: 16px; /* iOS에서 자동 줌 방지 */
                padding: 10px 8px;
            }
        }
        .file-input-btn { display: inline-block; padding: 8px 14px; background: #efefef; border-radius: 20px; font-size: 12px; cursor: pointer; }
        .media-preview-area { margin-top: 12px; }
        .existing-media-list, .new-media-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; max-height: 180px; overflow-y: auto; }
        .media-preview-item { position: relative; width: 70px; height: 70px; border-radius: 8px; overflow: hidden; background: #f0f0f0; flex-shrink: 0; }
        .media-preview-item img, .media-preview-item video { width: 100%; height: 100%; object-fit: cover; }
        .remove-media-btn { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.7); color: white; border: none; border-radius: 50%; width: 18px; height: 18px; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .media-filename { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); color: white; font-size: 8px; text-align: center; padding: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .submit-btn { width: 100%; padding: 10px; background: #ff8200; color: white; border: none; border-radius: 24px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 12px; }
        .cancel-btn { width: 100%; padding: 10px; background: #efefef; color: #666; border: none; border-radius: 24px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        
        /* 프로필 모달 */
        .profile-preview { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .profile-preview-img { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #ff8200, #ffb347); overflow: hidden; margin-bottom: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .profile-preview-img img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name-input input { text-align: center; font-size: 14px; font-weight: 600; border: 1px solid #ddd; border-radius: 20px; padding: 8px 16px; width: 200px; max-width: 100%; }
        
        /* 알림 모달 */
        .alert-modal { background: white; border-radius: 20px; width: 85%; max-width: 320px; text-align: center; }
        .alert-icon { font-size: 40px; padding-top: 20px; }
        .alert-title { font-size: 16px; font-weight: 600; margin: 10px 0 6px; }
        .alert-message { font-size: 13px; color: #666; padding: 0 16px; line-height: 1.4; }
        .alert-files { background: #f5f5f5; margin: 12px 16px; padding: 8px; border-radius: 10px; font-size: 11px; max-height: 120px; overflow-y: auto; text-align: left; }
        .alert-btn { width: 100%; padding: 12px; background: #ff8200; color: white; border: none; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 12px; border-radius: 0 0 20px 20px; }
        
        /* 이미지 뷰어 */
        .image-viewer { display: flex; visibility: hidden; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0); z-index: 2000; justify-content: center; align-items: center; transition: background 0.2s, opacity 0.2s; opacity: 0; }
        .image-viewer.active { visibility: visible; background: #000; opacity: 1; }
        .image-viewer img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .image-viewer-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 28px; cursor: pointer; width: 44px; height: 44px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        
        /* 갤러리 모달 */
        .gallery-modal { display: flex; visibility: hidden; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; justify-content: center; align-items: center; }
        .gallery-modal.active { visibility: visible; }
        .gallery-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 28px; cursor: pointer; width: 44px; height: 44px; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2002; }
        .gallery-content { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; cursor: grab; }
        #galleryMediaContainer { transition: transform 0.05s linear; will-change: transform; }
        .gallery-modal.pulling #galleryMediaContainer { transition: none; }
        .gallery-modal.pulling { background: #000; }
        .gallery-content:active { cursor: grabbing; }
        .gallery-media { max-width: 90%; max-height: 85vh; object-fit: contain; display: block; margin: 0 auto; }
        .gallery-media video { max-width: 90%; max-height: 85vh; display: block; margin: 0 auto; }
        .gallery-nav { position: absolute; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; pointer-events: none; top: 50%; transform: translateY(-50%); z-index: 2001; }
        .gallery-prev, .gallery-next { pointer-events: auto; width: 48px; height: 48px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; cursor: pointer; z-index: 2002; }
        .gallery-prev.hidden, .gallery-next.hidden { visibility: hidden; }
        .gallery-counter { position: absolute; bottom: 20px; background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 20px; color: white; font-size: 12px; z-index: 2002; }
        
        /* 백업 모달 */
        .backup-modal { background: white; border-radius: 20px; width: 85%; max-width: 360px; }
        .backup-options { display: flex; gap: 10px; padding: 16px; flex-wrap: wrap; }
        .backup-btn-item { flex: 1; padding: 10px; background: #f5f5f5; border: none; border-radius: 12px; cursor: pointer; font-size: 13px; }
        .backup-btn-item.export { background: #ff8200; color: white; }
        .backup-btn-item.import { background: #4caf50; color: white; }
        .file-input-hidden { display: none; }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .upload-progress { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(0,0,0,0.8); color: white; padding: 12px; border-radius: 12px; text-align: center; font-size: 12px; z-index: 2000; display: none; }
        

        /* ── 전체 전환 애니메이션 ── */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.94); }
            to   { opacity: 1; transform: scale(1); }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* 게시물 카드 등장 */
        .post-card {
            animation: fadeInUp 0.22s ease both;
        }
        /* 카드 순서별 딜레이 (최대 8개) */
        .post-card:nth-child(1) { animation-delay: 0.00s; }
        .post-card:nth-child(2) { animation-delay: 0.03s; }
        .post-card:nth-child(3) { animation-delay: 0.06s; }
        .post-card:nth-child(4) { animation-delay: 0.09s; }
        .post-card:nth-child(5) { animation-delay: 0.12s; }
        .post-card:nth-child(6) { animation-delay: 0.15s; }
        .post-card:nth-child(7) { animation-delay: 0.18s; }
        .post-card:nth-child(8) { animation-delay: 0.20s; }

        /* 모달 열림 */
        .modal-overlay { opacity: 0; transition: opacity 0.2s ease; pointer-events: none; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-container { transform: translateY(16px) scale(0.98); transition: transform 0.22s ease, opacity 0.22s ease; opacity: 0; }
        .modal-overlay.active .modal-container { transform: translateY(0) scale(1); opacity: 1; }

        /* 갤러리 열림/닫힘 */
        .gallery-modal { opacity: 0; transition: opacity 0.2s ease; pointer-events: none; }
        .gallery-modal.active { opacity: 1; pointer-events: auto; }
        #galleryMediaContainer > * { animation: scaleIn 0.18s ease both; }

        /* 보관함 그리드 아이템 */
        .archive-item { animation: fadeIn 0.2s ease both; }

        /* 탭 전환 - 콘텐츠 영역 */
        #postsContainer, #archiveContainer { animation: fadeIn 0.18s ease both; }

        /* 버튼 hover/active */
        .icon-btn, .add-btn, .tab-btn, .sort-btn, .page-btn, .submit-btn, .cancel-btn, .backup-btn-item {
            transition: opacity 0.15s, transform 0.12s, background 0.15s;
        }
        .icon-btn:hover, .add-btn:hover { opacity: 0.85; }
        .icon-btn:active, .add-btn:active { transform: scale(0.9); }
        .submit-btn:active { transform: scale(0.98); }
        .page-btn:hover { border-color: #ff8200; color: #ff8200; }

        /* 이미지/영상 로드 페이드인 */
        .post-media-item img, .post-media-item video,
        .archive-item img, .archive-item video {
            animation: fadeIn 0.25s ease both;
        }

        /* 동기화 상태 */
        .sync-status { transition: background 0.3s, color 0.3s; }

        /* 상단이동 버튼 */
        .scroll-top-btn { transition: opacity 0.25s, transform 0.2s, box-shadow 0.2s; }
        .scroll-top-btn:hover { box-shadow: 0 4px 18px rgba(255,130,0,0.55); transform: translateY(-2px); }

        @media (max-width: 680px) {
            .post-media.grid-1 .post-media-item { min-height: 220px; }
            .stats { flex-wrap: wrap; justify-content: space-between; }
            .gallery-prev, .gallery-next { width: 36px; height: 36px; font-size: 18px; }
            .modal-container { width: 95%; }
        }

        /* SVG 아이콘 정렬 공통 */
        .icon-btn svg, .add-btn svg { display:block; }
        .tab-btn { display:flex; align-items:center; justify-content:center; gap:5px; }
        .tab-btn svg { flex-shrink:0; }
        .action-btn { display:flex; align-items:center; gap:4px; }
        .action-btn svg { flex-shrink:0; }
        .sort-btn { display:flex; align-items:center; gap:4px; }
        .search-bar > span { display:flex; align-items:center; }
        .post-date, .post-location { display:flex; align-items:center; gap:3px; }
        .post-date svg, .post-location svg { flex-shrink:0; opacity:0.6; }
        .sync-status { display:inline-flex; align-items:center; gap:3px; }
        .backup-btn-item { display:flex; align-items:center; justify-content:center; gap:6px; }
        .form-group label { display:flex; align-items:center; gap:5px; }

        /* 상단 이동 버튼 */
        .scroll-top-btn {
            position: fixed;
            bottom: 24px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #ff8200;
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 12px rgba(255,130,0,0.4);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s, transform 0.25s;
            z-index: 500;
        }
        .scroll-top-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .scroll-top-btn:active { transform: scale(0.92); }

        /* 프로필 드롭다운 */
        .profile-wrap { position: relative; display: flex; align-items: center; gap: 2px; }
        .profile-dropdown-btn { width: 22px; height: 22px; border-radius: 50%; background: rgba(0,0,0,0.08); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; color: #666; }
        .profile-dropdown-btn:active { background: rgba(0,0,0,0.15); }
        .profile-menu { position: absolute; top: calc(100% + 8px); left: 0; background: white; border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,0.14); min-width: 180px; z-index: 200; overflow: hidden; display: none; animation: fadeInUp 0.18s ease both; }
        .profile-menu.open { display: block; }
        .profile-menu-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; font-size: 13px; transition: background 0.12s; border: none; background: none; width: 100%; text-align: left; }
        .profile-menu-item:hover { background: #f5f5f5; }
        .profile-menu-item.active-profile { background: #fff5eb; color: #ff8200; font-weight: 600; }
        .profile-menu-item .pm-avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, #ff8200, #ffb347); overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .profile-menu-item .pm-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-menu-divider { height: 1px; background: #f0f0f0; margin: 4px 0; }
        .profile-menu-add { color: #ff8200; }

        /* 즐겨찾기 필터 버튼 */

            <div class="gallery-nav">
                <div class="gallery-prev" id="galleryPrevBtn">◀</div>
                <div class="gallery-next" id="galleryNextBtn">▶</div>
            </div>
            <div id="galleryMediaContainer"></div>
        </div>
        <div class="gallery-counter" id="galleryCounter"></div>
    </div>

    <script>
        // ==================== Cloudinary 설정 ====================
        const CLOUDINARY_CLOUD_NAME = "dduysrkk7";
        const CLOUDINARY_UPLOAD_PRESET = "weibo_upload";

        // ==================== JSONBin 설정 (게시물 데이터 동기화용) ====================
        const JSONBIN_BIN_ID = "69cd88cc856a682189eefb06";
        const JSONBIN_API_KEY = "$2a$10$/FXh/Agpz01vjrcmEic7wugXaICmT9cXP68MXB3uwRu.asgw6h4NS";
        const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;
        
        // ==================== 관리자 인증 ====================
        const ADMIN_PASSWORD = "weibㅐ950305";
        
        function isAdmin() { return localStorage.getItem("weibo_admin") === "true"; }
        
        function checkAdmin() {
            if (isAdmin()) return true;
            const input = prompt("🔐 관리자 인증이 필요합니다.\n비밀번호를 입력하세요:");
            if (input === ADMIN_PASSWORD) {
                localStorage.setItem("weibo_admin", "true");
                showAlert("인증 성공", "관리자 모드로 접속했습니다.");
                location.reload();
                return true;
            } else if (input !== null) {
                showAlert("인증 실패", "비밀번호가 올바르지 않습니다.", [], true);
                return false;
            }
            return false;
        }
        
        function logout() {
            localStorage.removeItem("weibo_admin");
            showAlert("로그아웃", "관리자 모드가 종료되었습니다.");
            setTimeout(() => location.reload(), 1500);
        }
        
        function updateAdminUI() {
            const admin = isAdmin();
            const addBtn = document.getElementById('addBtn');
            const adminBtn = document.getElementById('adminBtn');
            if (admin) {
                if (addBtn) addBtn.style.display = 'flex';
                if (adminBtn) { adminBtn.innerHTML = '<svg width="18" height="18" aria-hidden="true"><use href="#ic-logout"/></svg>'; adminBtn.title = '로그아웃'; adminBtn.onclick = logout; }
            } else {
                if (addBtn) addBtn.style.display = 'none';
                if (adminBtn) { adminBtn.innerHTML = '<svg width="18" height="18" aria-hidden="true"><use href="#ic-lock"/></svg>'; adminBtn.title = '관리자 로그인'; adminBtn.onclick = () => checkAdmin(); }
            }
        }
        
        // ==================== Cloudinary 동기화 ====================
        let syncTimeout = null;
        
        function updateSyncStatus(status, message) {
            const statusSpan = document.getElementById('syncStatus');
            if (!statusSpan) return;
            if (status === 'synced') {
                statusSpan.innerHTML = '<svg width="11" height="11" aria-hidden="true"><use href="#ic-check"/></svg> 동기화완료';
                statusSpan.className = 'sync-status synced';
            } else if (status === 'syncing') {
                statusSpan.innerHTML = '⟳ 동기화중...';
                statusSpan.className = 'sync-status syncing';
            } else if (status === 'error') {
                statusSpan.innerHTML = `<svg width="11" height="11" aria-hidden="true"><use href="#ic-warn"/></svg> ${message || '동기화 실패'}`;
                statusSpan.className = 'sync-status error';
            }
        }
        
        // ==================== JSONBin 동기화 ====================
        async function syncPostsToJSONBin() {
            if (!isAdmin()) return;
            updateSyncStatus('syncing');
            try {
                const data = { version: '1.0', lastUpdated: new Date().toISOString(), posts: posts, profile: currentProfile, profiles: profiles, currentProfileId: currentProfileId };
                const response = await fetch(JSONBIN_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': JSONBIN_API_KEY
                    },
                    body: JSON.stringify(data)
                });
                if (!response.ok) throw new Error('업로드 실패 ' + response.status);
                updateSyncStatus('synced');
            } catch (error) {
                console.error('JSONBin 동기화 오류:', error);
                updateSyncStatus('error', error.message);
            }
        }

        async function loadPostsFromJSONBin() {
            updateSyncStatus('syncing');
            try {
                // 8초 타임아웃 (느린 네트워크 대응)
                const controller = new AbortController();
                const timer = setTimeout(() => controller.abort(), 8000);
                const response = await fetch(JSONBIN_URL + '/latest', {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY },
                    signal: controller.signal
                });
                clearTimeout(timer);
                if (!response.ok) { updateSyncStatus('synced'); return; }
                const result = await response.json();
                const data = result.record;
                if (data && data.posts && Array.isArray(data.posts)) {
                    // 로컬보다 서버 데이터가 새로울 때만 업데이트
                    const remoteUpdated = data.lastUpdated || '';
                    if (!lastCloudinaryUpdated || remoteUpdated > lastCloudinaryUpdated) {
                        lastCloudinaryUpdated = remoteUpdated;
                        // 저장 중엔 원격 데이터로 덮어쓰지 않음 (게시글 사라짐 버그 방지)
                        if (!isSaving) {
                            posts = sortPosts(data.posts);
                            localStorage.setItem('weibo_posts_v16', JSON.stringify(posts));
                            // profiles 배열 복원 (다중 프로필 동기화 핵심)
                            if (data.profiles && Array.isArray(data.profiles) && data.profiles.length > 0) {
                                profiles = data.profiles;
                                // 현재 기기의 currentProfileId가 서버에도 있으면 유지, 없으면 첫 번째로
                                const stillExists = profiles.find(p => p.id === currentProfileId);
                                if (!stillExists) {
                                    currentProfileId = profiles[0].id;
                                }
                                currentProfile = profiles.find(p => p.id === currentProfileId) || profiles[0];
                                saveProfiles();
                            } else if (data.profile) {
                                currentProfile = data.profile;
                            }
                            updateProfileUI();
                            if (activeTab === 'posts') renderPosts(); else renderArchive();
                        }
                    }
                    updateSyncStatus('synced');
                } else {
                    updateSyncStatus('synced');
                }
            } catch (error) {
                if (error.name === 'AbortError') {
                    console.log('JSONBin 타임아웃 - 로컬 캐시 사용');
                } else {
                    console.log('JSONBin에서 데이터를 불러올 수 없습니다:', error);
                }
                updateSyncStatus('synced');
            }
        }
        
        function scheduleSync() {
            if (!isAdmin()) return;
            if (syncTimeout) clearTimeout(syncTimeout);
            syncTimeout = setTimeout(() => { syncPostsToJSONBin(); }, 1000);
        }

        // ==================== 자동 폴링 (비관리자 포함, 30초마다 최신 데이터 확인) ====================
        let lastCloudinaryUpdated = null;
        async function pollForUpdates() {
            try {
                const response = await fetch(JSONBIN_URL + '/latest', {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                if (!response.ok) return;
                const result = await response.json();
                const data = result.record;
                if (data && data.posts && Array.isArray(data.posts)) {
                    const remoteUpdated = data.lastUpdated || '';
                    if (remoteUpdated && remoteUpdated !== lastCloudinaryUpdated) {
                        lastCloudinaryUpdated = remoteUpdated;
                        if (!isSaving) {
                            posts = sortPosts(data.posts);
                            localStorage.setItem('weibo_posts_v16', JSON.stringify(posts));
                            if (data.profiles && Array.isArray(data.profiles) && data.profiles.length > 0) {
                                profiles = data.profiles;
                                const stillExists = profiles.find(p => p.id === currentProfileId);
                                if (!stillExists) currentProfileId = profiles[0].id;
                                currentProfile = profiles.find(p => p.id === currentProfileId) || profiles[0];
                                saveProfiles();
                            } else if (data.profile) {
                                currentProfile = data.profile;
                            }
                            updateProfileUI();
                            if (activeTab === 'posts') renderPosts(); else renderArchive();
                            updateSyncStatus('synced');
                        }
                    }
                }
            } catch(e) { /* 폴링 오류 무시 */ }
        }

        function startAutoPolling() {
            // 주기적 폴링 제거 → 페이지 포커스(다른 탭/앱에서 돌아올 때)에만 동기화
            // 저장 직후 폴링으로 인한 게시글 사라짐 버그 완전 차단
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && !isSaving) {
                    // 마지막 동기화로부터 60초 이상 지났을 때만 불러오기
                    const now = Date.now();
                    if (!startAutoPolling._lastFetch || now - startAutoPolling._lastFetch > 60000) {
                        startAutoPolling._lastFetch = now;
                        loadPostsFromJSONBin();
                    }
                }
            });
        }
        
        // ==================== 데이터 ====================
        let posts = [];
        let currentPage = 1;
        let archivePage = 1;
        let searchKeyword = '';
        let sortOrder = 'desc';
        let activeTab = 'posts';
        const POSTS_PER_PAGE = 10;
        const ARCHIVE_PER_PAGE = 100;
        
        // 다중 프로필
        let profiles = [];           // [{id, name, imagePath}, ...]
        let currentProfileId = null; // 현재 선택된 프로필 id
        let currentProfile = { name: "허개🐷", imagePath: "images/profile.jpg" };
        const LIKES = 1995, COMMENTS = 305, RETWEETS = 486;
        // 즐겨찾기 필터
        let starFilterActive = false;
        
        let editingPostId = null;
        let existingMedia = [];
        let newMediaFiles = [];
        let galleryItems = [];
        let galleryIndex = 0;
        let dragStartX = 0, isDragging = false;
        // pull-down to close
        let pullStartY = 0, pullCurrentY = 0, isPulling = false;
        let pullStartX = 0; // 방향 판별용
        // 저장 중 폴링 렌더 차단 플래그
        let isSaving = false;
        
        // ==================== Cloudinary 업로드 ====================
        async function uploadToCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
            try {
                const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/upload`, { method: 'POST', body: formData });
                if (!response.ok) throw new Error('업로드 실패');
                const data = await response.json();
                return { success: true, url: data.secure_url, type: data.resource_type === 'video' ? 'video' : 'image', originalName: file.name };
            } catch (error) {
                console.error('Cloudinary 업로드 오류:', error);
                return { success: false, error: error.message };
            }
        }
        
        async function uploadMultipleFiles(files, onProgress) {
            const results = [];
            let completed = 0;
            const total = files.length;
            for (const file of files) {
                if (onProgress) onProgress(completed + 1, total);
                const result = await uploadToCloudinary(file);
                if (result.success) results.push(result);
                completed++;
                if (onProgress) onProgress(completed, total);
            }
            return results;
        }
        
        function showUploadProgress(current, total) {
            const progressDiv = document.getElementById('uploadProgress');
            const currentSpan = document.getElementById('uploadCount');
            const totalSpan = document.getElementById('uploadTotal');
            if (current === 0) { progressDiv.style.display = 'block'; totalSpan.textContent = total; }
            currentSpan.textContent = current;
            if (current === total && total > 0) setTimeout(() => { progressDiv.style.display = 'none'; }, 500);
        }
        
        // ==================== 정렬 함수 ====================
        function sortPosts(postsArray) {
            return [...postsArray].sort((a, b) => {
                if (a.date > b.date) return sortOrder === 'desc' ? -1 : 1;
                if (a.date < b.date) return sortOrder === 'desc' ? 1 : -1;
                const timeA = a.createdAt || a.id;
                const timeB = b.createdAt || b.id;
                if (timeA > timeB) return sortOrder === 'desc' ? -1 : 1;
                if (timeA < timeB) return sortOrder === 'desc' ? 1 : -1;
                return 0;
            });
        }
        
        function applySort() { posts = sortPosts(posts); savePosts(); scheduleSync(); if (activeTab === 'posts') renderPosts(); else renderArchive(); }
        function toggleSort() {
            sortOrder = sortOrder === 'desc' ? 'asc' : 'desc';
            const text = sortOrder === 'desc' ? '최신순' : '오래된순';
            const sortBtn = document.getElementById('sortBtn');
            if (sortBtn) sortBtn.innerHTML = `<svg width="13" height="13" aria-hidden="true"><use href="#ic-sort"/></svg> ${text}`;
            applySort();
        }
        
        // ==================== 데이터 저장/로드 ====================
        async function loadData() {
            // 프로필 먼저 로드 (localStorage)
            loadProfiles();
            // 1단계: localStorage 캐시로 즉시 렌더링
            const saved = localStorage.getItem('weibo_posts_v16');
            if (saved) { posts = JSON.parse(saved); posts = sortPosts(posts); }
            updateProfileUI();
            if (activeTab === 'posts') renderPosts(); else renderArchive();
            // 2단계: JSONBin에서 최신 데이터 (profiles 포함) 항상 가져오기
            // lastCloudinaryUpdated를 null로 두어 강제 동기화
            lastCloudinaryUpdated = null;
            loadPostsFromJSONBin();
        }
        
        function savePosts() { localStorage.setItem('weibo_posts_v16', JSON.stringify(posts)); }
        function saveCurrentProfile() { localStorage.setItem('weibo_current_profile', JSON.stringify(currentProfile)); }
        
        function getFilteredPosts() {
            let filtered = posts;
            if (starFilterActive) {
                filtered = filtered.filter(p => p.starred);
            }
            if (searchKeyword) {
                filtered = filtered.filter(p => p.content.toLowerCase().includes(searchKeyword.toLowerCase()) || (p.location && p.location.toLowerCase().includes(searchKeyword.toLowerCase())));
            }
            return filtered;
        }
        
        // ==================== 미디어 그리드 클래스 결정 ====================
        function getMediaGridClass(count) {
            if (count === 1) return 'grid-1';
            if (count === 2) return 'grid-2';
            if (count === 4) return 'grid-4';
            return 'grid-3';
        }
        
        // ==================== 렌더링 함수들 ====================
        function formatDate(str) { const d = new Date(str); return `${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`; }
        function escapeHtml(t) { const div = document.createElement('div'); div.textContent = t; return div.innerHTML; }
        
        function scrollToPost(postId) {
            // 해당 게시글이 있는 페이지 번호 찾기
            function goToPostAndHighlight() {
                const filtered = getFilteredPosts();
                const idx = filtered.findIndex(p => p.id === postId);
                if (idx === -1) return;
                const targetPage = Math.floor(idx / POSTS_PER_PAGE) + 1;
                if (currentPage !== targetPage) {
                    currentPage = targetPage;
                    renderPosts();
                }
                setTimeout(() => {
                    const el = document.getElementById(`post-${postId}`);
                    if (el) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                        el.classList.add('highlight');
                        setTimeout(() => el.classList.remove('highlight'), 1200);
                    }
                }, 80);
            }
            if (activeTab !== 'posts') {
                // 탭 전환 후 이동
                activeTab = 'posts';
                document.getElementById('postsTabBtn').classList.add('active');
                document.getElementById('archiveTabBtn').classList.remove('active');
                document.getElementById('postsArea').style.display = 'block';
                document.getElementById('archiveArea').style.display = 'none';
                setTimeout(goToPostAndHighlight, 50);
            } else {
                goToPostAndHighlight();
            }
        }
        
        // Cloudinary 영상 URL을 H.264 MP4로 강제 변환 (HEVC/H.265 크로스브라우저 문제 해결)
        function getVideoUrl(videoUrl) {
            if (videoUrl.includes('cloudinary.com')) {
                // vc_h264: H.264로 트랜스코딩, ac_aac: 오디오 AAC
                // f_mp4: MP4 컨테이너 강제
                return videoUrl
                    .replace('/upload/', '/upload/vc_h264,ac_aac,f_mp4/')
                    .replace(/\.(mov|avi|mkv|webm|m4v|MP4)(\?.*)?$/i, '.mp4');
            }
            return videoUrl;
        }

        // 비디오 썸네일을 Cloudinary 이미지 URL로 변환 (video 태그 대신 img 태그 사용 → 빠르고 안정적)
        function getVideoThumbnailUrl(videoUrl) {
            if (videoUrl.includes('cloudinary.com')) {
                return videoUrl
                    .replace('/upload/', '/upload/so_1,f_jpg,q_60/')
                    .replace(/\.(mp4|mov|avi|mkv|webm|m4v|MP4)(\?.*)?$/i, '.jpg');
            }
            return null;
        }
        
        function renderPosts() {
            const filtered = getFilteredPosts();
            const total = filtered.length;
            const totalPages = Math.ceil(total / POSTS_PER_PAGE);
            if (currentPage > totalPages && totalPages) currentPage = totalPages;
            const pagePosts = filtered.slice((currentPage-1)*POSTS_PER_PAGE, currentPage*POSTS_PER_PAGE);
            
            const searchInfo = searchKeyword ? ` (검색: "${searchKeyword}")` : '';
            const sortText = sortOrder === 'desc' ? '최신순' : '오래된순';
            const postCountSpan = document.getElementById('postCount');
            if (postCountSpan) postCountSpan.innerHTML = `<svg width="13" height="13" aria-hidden="true"><use href="#ic-chart"/></svg> 총 ${total}개${searchInfo}`;
            const sortBtn = document.getElementById('sortBtn');
            if (sortBtn) sortBtn.innerHTML = `<svg width="13" height="13" aria-hidden="true"><use href="#ic-sort"/></svg> ${sortText}`;
            document.getElementById('sortBtn').onclick = toggleSort;
            
            const container = document.getElementById('postsContainer');
            if (!container) return;
            
            if (pagePosts.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="emoji" style="font-size:36px;margin-bottom:8px;font-size:40px;">◌</div><p>${searchKeyword ? '검색 결과 없음' : '게시물이 없습니다'}</p></div>`;
                const pagination = document.getElementById('pagination');
                if (pagination) pagination.innerHTML = '';
                return;
            }
            
            container.innerHTML = pagePosts.map(post => {
                const mediaCount = post.media.length;
                const gridClass = getMediaGridClass(mediaCount);
                const mediaHtml = post.media.length ? `
                    <div class="post-media ${gridClass}">
                        ${post.media.map((m, i) => {
                            const thumbUrl = m.type === 'video' ? getVideoThumbnailUrl(m.filePath) : null;
                            return `
                                <div class="post-media-item" onclick="openGallery(${post.id}, ${i})">
                                    ${m.type === 'video' ? 
                                        thumbUrl
                                            ? `<img src="${thumbUrl}" loading="lazy" onerror="this.outerHTML='<video preload=\\'metadata\\' style=\\'width:100%;height:100%;object-fit:cover;\\'><source src=\\'${getVideoUrl(m.filePath)}\\' type=\\'video/mp4\\'></video>'">
                                               <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.55);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;pointer-events:none;">▶</div>`
                                            : `<video preload="metadata" style="width:100%;height:100%;object-fit:cover;"><source src="${m.filePath}" type="video/mp4"><source src="${m.filePath}" type="video/quicktime"></video>
                                               <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.55);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;pointer-events:none;">▶</div>`
                                        : 
                                        `<img src="${m.filePath}" loading="lazy" onerror="this.src='data:image/svg+xml,%3Csvg...%3E'">`
                                    }
                                </div>
                            `;
                        }).join('')}
                    </div>
                ` : '';
                const profileData = post.profile || currentProfile;
                return `
                    <div class="post-card" id="post-${post.id}">
                        <button class="post-star-btn ${post.starred ? 'starred' : ''}" onclick="toggleStar(${post.id})" title="즐겨찾기">
                            <svg width="16" height="16"><use href="#ic-${post.starred ? 'star-fill' : 'star'}"/></svg>
                        </button>
                        <div class="post-header">
                            <div class="post-avatar" onclick="viewProfileImage('${profileData.imagePath}')">
                                <img src="${profileData.imagePath}" onerror="this.style.display='none';this.parentElement.innerHTML='<span>🐣</span>'">
                            </div>
                            <div class="post-user-info">
                                <h3>${escapeHtml(profileData.name)}<span class="badge">♥︎</span></h3>
                                <div class="post-date"><svg width="11" height="11" aria-hidden="true"><use href="#ic-calendar"/></svg> ${formatDate(post.date)}</div>
                                ${post.location ? `<div class="post-location"><svg width="11" height="11" aria-hidden="true"><use href="#ic-pin"/></svg> ${escapeHtml(post.location)}</div>` : ''}
                            </div>
                        </div>
                        <div class="post-content">${escapeHtml(post.content)}</div>
                        ${mediaHtml}
                        <div class="post-actions">
                            <button class="action-btn"><svg width="14" height="14" aria-hidden="true"><use href="#ic-heart-fill"/></svg> ${LIKES.toLocaleString()}</button>
                            <button class="action-btn"><svg width="14" height="14" aria-hidden="true"><use href="#ic-comment"/></svg> ${COMMENTS.toLocaleString()}</button>
                            <button class="action-btn"><svg width="14" height="14" aria-hidden="true"><use href="#ic-retweet"/></svg> ${RETWEETS.toLocaleString()}</button>
                            <button class="action-btn edit-btn" onclick="openPostModal(${post.id})" ${!isAdmin() ? 'style="display:none"' : ''}><svg width="14" height="14" aria-hidden="true"><use href="#ic-edit"/></svg></button>
                            <button class="action-btn delete-btn" onclick="deletePost(${post.id})" ${!isAdmin() ? 'style="display:none"' : ''}><svg width="14" height="14" aria-hidden="true"><use href="#ic-trash"/></svg></button>
                        </div>
                    </div>
                `;
            }).join('');
            
            let pages = '';
            if (currentPage > 1) pages += `<button class="page-btn" onclick="goToPage(${currentPage-1})">←</button>`;
            for (let i=Math.max(1,currentPage-2); i<=Math.min(totalPages,currentPage+2); i++) {
                pages += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goToPage(${i})">${i}</button>`;
            }
            if (currentPage < totalPages) pages += `<button class="page-btn" onclick="goToPage(${currentPage+1})">→</button>`;
            const paginationDiv = document.getElementById('pagination');
            if (paginationDiv) paginationDiv.innerHTML = pages;
        }
        
        function goToPage(page) { currentPage = page; renderPosts(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        
        // ==================== 보관함 ====================
        function getArchiveItems() {
            const items = [];
            posts.forEach(post => {
                if (post.media && post.media.length) {
                    post.media.forEach((media, idx) => {
                        items.push({
                            postId: post.id, mediaIndex: idx, date: post.date,
                            year: parseInt(post.date.split('-')[0]), month: parseInt(post.date.split('-')[1]),
                            type: media.type, filePath: media.filePath, fileName: media.fileName
                        });
                    });
                }
            });
            items.sort((a, b) => { if (a.date > b.date) return sortOrder === 'desc' ? -1 : 1; if (a.date < b.date) return sortOrder === 'desc' ? 1 : -1; return 0; });
            return items;
        }
        
        function groupByMonth(items) {
            const groups = {};
            items.forEach(item => {
                const key = `${item.year}-${String(item.month).padStart(2,'0')}`;
                if (!groups[key]) groups[key] = { year: item.year, month: item.month, items: [] };
                groups[key].items.push(item);
            });
            return Object.values(groups);
        }
        
        function renderArchive() {
            const allItems = getArchiveItems();
            const totalItems = allItems.length;
            const totalPages = Math.ceil(totalItems / ARCHIVE_PER_PAGE);
            if (archivePage > totalPages && totalPages) archivePage = totalPages;
            const pageItems = allItems.slice((archivePage-1)*ARCHIVE_PER_PAGE, archivePage*ARCHIVE_PER_PAGE);
            const groups = groupByMonth(pageItems);
            const container = document.getElementById('archiveContainer');
            if (!container) return;
            if (totalItems === 0) {
                container.innerHTML = `<div class="empty-state"><div class="emoji" style="font-size:36px;margin-bottom:8px;font-size:40px;">▭</div><p>사진/영상이 없습니다</p></div>`;
                const pagination = document.getElementById('archivePagination');
                if (pagination) pagination.innerHTML = '';
                return;
            }
            container.innerHTML = groups.map(group => `
                <div class="archive-month">
                    <div class="archive-month-header"><svg width="13" height="13" style="vertical-align:-2px;margin-right:4px"><use href="#ic-calendar"/></svg>${group.year}년 ${group.month}월 (${group.items.length}개)</div>
                    <div class="archive-grid">
                        ${group.items.map(item => {
                            const thumbUrl = item.type === 'video' ? getVideoThumbnailUrl(item.filePath) : null;
                            return `
                                <div class="archive-item" onclick="scrollToPost(${item.postId})">
                                    ${item.type === 'video' ?
                                        thumbUrl
                                            ? `<img src="${thumbUrl}" loading="lazy" onerror="this.outerHTML='<video preload=\\'metadata\\' style=\\'width:100%;height:100%;object-fit:cover;\\'><source src=\\'${getVideoUrl(item.filePath)}\\' type=\\'video/mp4\\'></video>'">
                                               <div class="archive-item-badge" style="display:flex;align-items:center;gap:2px;"><svg width="9" height="9" aria-hidden="true"><use href="#ic-play"/></svg> 영상</div>`
                                            : `<video preload="metadata" style="width:100%;height:100%;object-fit:cover;"><source src="${item.filePath}" type="video/mp4"><source src="${item.filePath}" type="video/quicktime"></video>
                                               <div class="archive-item-badge" style="display:flex;align-items:center;gap:2px;"><svg width="9" height="9" aria-hidden="true"><use href="#ic-play"/></svg> 영상</div>`
                                        :
                                        `<img src="${item.filePath}" loading="lazy">`
                                    }
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `).join('');
            let pages = '';
            if (archivePage > 1) pages += `<button class="page-btn" onclick="goToArchivePage(${archivePage-1})">←</button>`;
            for (let i=Math.max(1,archivePage-2); i<=Math.min(totalPages,archivePage+2); i++) {
                pages += `<button class="page-btn ${i===archivePage?'active':''}" onclick="goToArchivePage(${i})">${i}</button>`;
            }
            if (archivePage < totalPages) pages += `<button class="page-btn" onclick="goToArchivePage(${archivePage+1})">→</button>`;
            const paginationDiv = document.getElementById('archivePagination');
            if (paginationDiv) paginationDiv.innerHTML = pages;
        }

        function renderExistingMedia() {
            const container = document.getElementById('existingMediaList');
            if (!container) return;

        const MAX_IMAGE_MB = 10;
        const MAX_VIDEO_MB = 100;
        const MAX_IMAGE_BYTES = MAX_IMAGE_MB * 1024 * 1024;
        const MAX_VIDEO_BYTES = MAX_VIDEO_MB * 1024 * 1024;
        function getMaxBytes(file) {
            return file.type.startsWith('video/') ? MAX_VIDEO_BYTES : MAX_IMAGE_BYTES;
        }
        function getMaxMB(file) {
            return file.type.startsWith('video/') ? MAX_VIDEO_MB : MAX_IMAGE_MB;
        }

        function renderNewMedia() {
            const container = document.getElementById('newMediaList');
            if (!container) return;
            container.innerHTML = '';
            newMediaFiles.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'media-preview-item';
                const isVideo = item.file.type.startsWith('video/');
                const maxBytes = getMaxBytes(item.file);
                const maxMB = getMaxMB(item.file);
                const overSize = item.file.size > maxBytes;
                const sizeMB = (item.file.size / 1024 / 1024).toFixed(1);
                div.innerHTML = `
                    ${isVideo
                        ? `<video src="${item.url}" style="width:100%;height:100%;object-fit:cover;${overSize?'filter:brightness(0.35)':''}"></video>`
                        : `<img src="${item.url}" style="width:100%;height:100%;object-fit:cover;${overSize?'filter:brightness(0.35)':''}">`
                    }
                    ${overSize ? `
                        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;pointer-events:none;">
                            <svg width="22" height="22" style="color:#ff4444"><use href="#ic-warn"/></svg>
                            <span style="color:#ff4444;font-size:9px;font-weight:700;text-align:center;line-height:1.2;">${sizeMB}MB<br>${maxMB}MB 초과</span>
                        </div>` : ''}
                    <button class="remove-media-btn" data-idx="${idx}"><svg width="14" height="14" aria-hidden="true"><use href="#ic-x"/></svg></button>
                    <div class="media-filename" style="${overSize?'background:rgba(255,68,68,0.85);':''}">${item.file.name.length > 12 ? item.file.name.slice(0,9)+'...' : item.file.name}</div>
                `;
                const removeBtn = div.querySelector('.remove-media-btn');
                removeBtn.onclick = (e) => { e.stopPropagation(); URL.revokeObjectURL(item.url); newMediaFiles.splice(idx, 1); renderNewMedia(); };

            });

            if (area) area.style.display = newMediaFiles.length ? 'block' : 'none';

        async function savePost() {
            if (!isAdmin()) { checkAdmin(); return; }
            const date = document.getElementById('postDate').value;
            const location = document.getElementById('postLocation').value.trim();
            const content = document.getElementById('postContent').value.trim();
            if (!date) { showAlert('오류', '날짜를 선택해주세요.'); return; }
            if (!content) { showAlert('오류', '내용을 입력해주세요.'); return; }
            isSaving = true; // 저장 중 폴링 덮어쓰기 차단
            
            // 용량 초과 파일 제외 (이미지 10MB / 영상 100MB)
            const oversized = newMediaFiles.filter(item => item.file.size > getMaxBytes(item.file));
            if (oversized.length > 0) {
                const names = oversized.map(i => {
                    const mb = (i.file.size/1024/1024).toFixed(1);
                    const limit = getMaxMB(i.file);
                    return `${i.file.name} (${mb}MB / 한도 ${limit}MB)`;
                }).join('\n');
                showAlert('용량 초과 파일 제외', `${oversized.length}개 파일이 제외됩니다:\n${names}`, [], true);
                await new Promise(r => setTimeout(r, 100));
            }
            const filesToUpload = newMediaFiles.filter(item => item.file.size <= getMaxBytes(item.file)).map(item => item.file);
            let uploadedFiles = [];
            if (filesToUpload.length > 0) {
                showUploadProgress(0, filesToUpload.length);
                uploadedFiles = await uploadMultipleFiles(filesToUpload, (c, t) => showUploadProgress(c, t));
            }
            const newMedia = uploadedFiles.map(file => ({ type: file.type, fileName: file.originalName, filePath: file.url }));
            const finalMedia = [...existingMedia, ...newMedia];
            
            if (editingPostId !== null) {
                const idx = posts.findIndex(p => p.id === editingPostId);
                if (idx !== -1) {
                    posts[idx] = { ...posts[idx], date, location, content, media: finalMedia, updatedAt: new Date().toISOString() };
                    posts = sortPosts(posts);
                    savePosts();
                    closePostModal();
                    if (activeTab === 'posts') renderPosts(); else renderArchive();
                    showAlert('수정 완료', '게시물이 수정되었습니다.');
                } else {
                    showAlert('오류', '게시물을 찾을 수 없습니다.', [], true);
                }
            } else {
                const newPost = { id: Date.now(), date, location, content, media: finalMedia, profile: { name: currentProfile.name, imagePath: currentProfile.imagePath }, createdAt: new Date().toISOString() };
                posts.push(newPost);
                posts = sortPosts(posts);
                savePosts();
                closePostModal();
                currentPage = 1;
                if (activeTab === 'posts') renderPosts(); else renderArchive();
                showAlert('추가 완료', '게시물이 추가되었습니다.');
            }
            newMediaFiles.forEach(f => { if (f.url) URL.revokeObjectURL(f.url); });
            newMediaFiles = [];
            // JSONBin 동기화 완료 후 플래그 해제
            scheduleSync();
            setTimeout(() => { isSaving = false; }, 3000);
        }
